<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Música</title>
    <!-- Google Fonts: Inter y Syne para legibilidad y acentos premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css2/style.css">
<link rel="stylesheet" href="/css2/style_caja_de_artista.css">

<body data-current-nav="buscar" id="vista_buscar">
    
    <aside class="sidebar" id="main-sidebar"></aside>
    
    <main class="buscador" id="app-content">  
        
        <header>
            <h1 class="header-title">Explorar Música</h1>
        </header>

        <section class="search-wrapper" >
            <div id = "elementos_de_busqueda">
                <input type="text" id="input_busqueda" placeholder="Artistas, álbumes o canciones..." >
                <button type="button" id="buscar"  >Buscar</button>
            </div>

           
        </section>



        <div id="resultados" class="grid-container">
            </div>

    </div>

    </main>

    <script src="/js2/sidebar.js"></script>
    <script src="/js2/botones_laterales.js"></script>
     <script src="/js2/api.js"></script>
