<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deezer-Manager - Modo Offline</title>
    <!-- Importamos el estilo principal para mantener consistencia de temas y variables -->
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, var(--bg-main), var(--bg-surface));
      }
      .offline-container {
        text-align: center;
        background: var(--bg-surface);
        padding: 40px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-flat);
        border: 1px solid var(--border-color);
        max-width: 480px;
        width: 100%;
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .offline-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        display: inline-block;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }
      h1 {
        font-family: var(--font-syne);
        color: var(--text-main);
        margin-bottom: 15px;
        font-size: 2rem;
      }
      p {
        color: var(--text-muted);
        margin-bottom: 30px;
        line-height: 1.6;
        font-size: 1rem;
      }
      .actions-wrapper {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px 24px;
        border-radius: var(--radius-pill);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition-smooth);
        text-decoration: none;
        font-size: 1rem;
        text-align: center;
      }
      .btn-primary {
        background-color: var(--color-primary);
        color: var(--color-btn-text);
        border: none;
        box-shadow: 0 4px 10px var(--color-shadow-primary);
      }
      .btn-primary:hover {
        background-color: var(--color-primary-hover);
        transform: translateY(-2px);
      }
      .btn-secondary {
        background-color: transparent;
        color: var(--color-primary);
        border: 2px solid var(--color-primary);
      }
      .btn-secondary:hover {
        background-color: rgba(17, 66, 93, 0.05);
        transform: translateY(-2px);
      }
      body.oscuro .btn-secondary:hover {
        background-color: rgba(221, 255, 85, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="offline-container">
      <div class="offline-icon" aria-hidden="true">📡🚫</div>
      <h1>Sin conexión a Internet</h1>
      <p>
        Actualmente estás en modo offline. Puedes seguir calificando y escuchando tus álbumes guardados en la sección de favoritos; se sincronizarán en cuanto recuperes la conexión.
      </p>
      <div class="actions-wrapper">
        <a href="../html/favoritos.html" class="btn btn-primary">Ir a Mis Favoritos</a>
        <button type="button" onclick="window.location.reload();" class="btn btn-secondary">Reintentar Conexión</button>
      </div>
    </main>

    <script>
      // Sincronizar el tema guardado en localStorage para que el fallback también respete la preferencia de diseño
      const temaGuardado = localStorage.getItem('tema');
      if (temaGuardado === 'oscuro') {
        document.body.classList.add('oscuro');
      }
    </script>
  </body>
</html>
