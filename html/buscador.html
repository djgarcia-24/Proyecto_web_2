<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Música</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-current-nav="buscar" id="vista_buscar">
    
    <aside class="sidebar" id="main-sidebar"></aside>
    
    <main class="buscador" id="app-content">  
        
        <header>
            <h1 class="header-title">Explorar Música</h1>
        </header>

        <section class="search-wrapper" >
            <div id = "elementos_de_busqueda">
                <input type="text" id="input-busqueda" placeholder="Artistas, álbumes o canciones..." >
                <button type="button" id="btn-buscar" >Buscar</button>
            </div>

           
        </section>


    <div class="carta_artista_horizontal">
    
        <div class="tarjeta-imagen">
            <img src="https://via.placeholder.com/400x400" alt="Foto del Artista">
        </div>

        <div class="tarjeta-info">
        
            <h2 class="artista-titulo">Nombre del Artista</h2>
            <button type="button" class="boton_favorito" >❤️</button>

            <div class="albumes">
            
                <div class="album-bloque">
                    <h3>Albumes y canciones:</h3>
                    <ul>
                        <li>1. Pista uno</li>
                    
                        <!--canciones+albumes-->
                    </ul>
              </div>
            </div>
        </div>

    </div>

    </main>

    <script src="../js/sidebar.js"></script>
</body>
</html
