<!-- Selector flotante de tema -->
<button
  onclick="toggleTheme()"
  class="theme-float-btn neu-flat-pill neu-btn-active"
  aria-label="Cambiar Tema"
>
  <i id="theme-icon" class="fa-solid fa-sun"></i>
</button>

<!-- Tarjeta de Autenticación de Cristal -->
<div class="auth-card glass-panel">
  <!-- Marca UCAB -->
  <div class="brand-container">
    <div class="brand-logo-wrap neu-flat">
      <i class="fa-solid fa-wave-square"></i>
    </div>
    <h1 class="brand-title">DEEZER-MANAGER</h1>
    <p class="brand-subtitle">Proyecto Web UCAB</p>
    <p class="brand-desc">
      Introduce tus credenciales para conectar al servidor personal
    </p>
  </div>

  <!-- Formulario Neumórfico -->
  <form id="login-form" onsubmit="handleLogin(event)" class="auth-form">
    <div class="form-group">
      <label class="form-label">Correo Electrónico / Usuario</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <i class="fa-solid fa-user"></i>
        </span>
        <input
          type="text"
          id="login-username"
          required
          placeholder="p.ej. usuario@correo.com"
          value="estudiante@ucab.ve"
          class="input-field neu-inset"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña del Servidor</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <i class="fa-solid fa-lock"></i>
        </span>
        <input
          type="password"
          id="login-password"
          required
          placeholder="••••••••••••"
          value="12345678"
          class="input-field neu-inset"
        />
      </div>
    </div>

    <button
      type="submit"
      id="login-btn"
      class="btn-submit neu-flat-pill neu-btn-active"
    >
      <span id="login-btn-text">Ingresar con Conexión</span>
    </button>
  </form>

  <!-- Spinner de carga obligatorio (Feedback visual continuo) -->
  <div id="login-loading" class="loading-state hidden">
    <div class="ucab-spinner"></div>
    <p id="loading-step-text" class="loading-text">Conectando al servidor...</p>
    <p class="empty-state-desc">Validando credenciales en tiempo real</p>
  </div>

  <!-- Pie de página de la tarjeta de autenticación -->
  <footer class="auth-footer">
    <p>Módulo de Autenticación Segura (UCAB Semestre 2-2025)</p>
  </footer>
</div>
