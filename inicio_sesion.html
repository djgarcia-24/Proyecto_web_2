<!DOCTYPE html>
<html lang="es" data-theme="light" data-page-title="Autenticación">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Deezer Manager - Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>

    <main class="carta_autenticacion">        
        <article class="auth-card">
            <div class="logo">
                <span>💿</span>
            </div>

            <div id="seccion-login">
                <h2>Iniciar Sesión</h2>

                <form id="form-login">
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="usuario@correo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••" required>
                    </div>

                    <button type="submit" id="iniciar_sesion">Iniciar sesion</button>
                </form>

                <div id="spinner" class="status-msg" hidden>
                    <p>Validando credenciales en el servidor...</p>
                </div>
            </div>

            <div id="seccion-final" class="status-msg" hidden>
                <div class="success-icon">✅</div>
                <h2>Bienvenido</h2>
                <p class="subtitle">Acceso validado correctamente. Redirigiendo...</p>
            </div>

        </article>
    </main>
    <script src="./js/inicio_sesion.js"></script>

</body>
</html>
